<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neptune's Pride - Test Environment</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #map-canvas {
            position: absolute;
            top: 0;
            left: 0;
            background-color: #000011;
        }
        
        .ui-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(26, 29, 68, 0.9);
            border: 1px solid #2C3273;
            padding: 10px;
            border-radius: 4px;
            z-index: 1000;
        }
        
        .status-text {
            color: #cccccc;
            font-size: 12px;
            margin-bottom: 5px;
        }
        
        .load-indicator {
            color: #ffff00;
            font-weight: bold;
        }
        
        /* Simulate Neptune's Pride styling */
        .button {
            background: linear-gradient(to bottom, #4a5196 0%, #3a4186 100%);
            border: 1px solid #2c3273;
            color: #ffffff;
            padding: 6px 12px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            margin: 2px;
        }
        
        .button:hover {
            background: linear-gradient(to bottom, #5a61a6 0%, #4a5196 100%);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="map-canvas" width="1200" height="800"></canvas>
        
        <div class="ui-overlay">
            <div class="status-text">Neptune's Pride Agent Test Environment</div>
            <div class="status-text">Game Files: <span id="game-status" class="load-indicator">Loading...</span></div>
            <div class="status-text">Extension Status: <span id="extension-status" class="load-indicator">Loading...</span></div>
            <button class="button" onclick="testScreenshot()">Test Screenshot</button>
            <button class="button" onclick="testReports()">Test Reports</button>
        </div>
    </div>

    <!-- Load jQuery first (required by Neptune's Pride) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Load real game data -->
    <script src="/static/real-game-data.js"></script>
    
    <!-- Load real Neptune's Pride game files -->
    <script src="/scripts/client/crux.js"></script>
    <script type="module" src="/scripts/client/templates.js"></script>
    <script type="module" src="/scripts/client/widgets.js"></script>
    <script src="/scripts/client/npui_shared.js"></script>
    <script type="module" src="/scripts/client/np/universe.js"></script>
    <script type="module" src="/scripts/client/np/game.js"></script>
    <script type="module" src="/scripts/client/np/map.js"></script>
    <script type="module" src="/scripts/client/np/interface.js"></script>
    <script type="module" src="/scripts/client/np/screens.js"></script>
    <script type="module" src="/scripts/client/np/inbox.js"></script>
    <script type="module" src="/scripts/client/np/recorder.js"></script>

    <script>
        // Initialize environment for real Neptune's Pride files
        window.$ = window.jQuery; // Ensure $ is available
        
        // Wait for all scripts to load before initializing
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, initializing Neptune\'s Pride environment...');
            
            // Check if real game data is available
            if (window.realGameData) {
                console.log('Real game data loaded');
                
                // Initialize the global structure that the extension expects
                window.NeptunesPride = window.NeptunesPride || {};
                
                // Use real game data from API
                const gameData = window.realGameData.scanning_data;
                window.NeptunesPride.universe = {
                    galaxy: {
                        players: gameData.players,
                        stars: gameData.stars,
                        fleets: gameData.fleets,
                        tick: gameData.tick,
                        tickRate: gameData.tickRate,
                        tickFragment: gameData.tickFragment || 0
                    }
                };
                
                // Set up npui structure for map canvas
                window.NeptunesPride.npui = {
                    map: {
                        canvas: [document.getElementById('map-canvas')]
                    }
                };
                
                window.NeptunesPride.gameVersion = "real-v4.0";
                window.NeptunesPride.gameNumber = gameData.name || "real-test-game";
                
                console.log('Neptune\'s Pride environment initialized with real game data');
                
                // Initialize the real map with actual game data
                initializeRealMap();
                
                document.getElementById('game-status').textContent = 'Loaded (Real Data)';
                document.getElementById('game-status').style.color = '#4a9';
                
                // Check for Crux library separately
                if (window.Crux) {
                    console.log('Real Crux library also loaded');
                    window.NeptunesPride.crux = window.Crux.crux || window.Crux;
                }
                
            } else {
                console.error('Real game data not found. Cannot initialize test environment.');
                document.getElementById('game-status').textContent = 'Error - Real data required';
                document.getElementById('game-status').style.color = '#f44';
            }
            
            // Check if extension is loaded
            setTimeout(() => {
                if (window.NeptunesPrideAgent || (window.NeptunesPride && window.NeptunesPride.version)) {
                    document.getElementById('extension-status').textContent = 'Active';
                    document.getElementById('extension-status').style.color = '#4a9';
                } else {
                    document.getElementById('extension-status').textContent = 'Not Detected';
                    document.getElementById('extension-status').style.color = '#f44';
                }
            }, 2000);
        });

        // Initialize real Neptune's Pride map using actual game data
        function initializeRealMap() {
            const canvas = document.getElementById('map-canvas');
            const ctx = canvas.getContext('2d');
            const gameData = window.realGameData.scanning_data;
            
            // Clear canvas with Neptune's Pride background
            ctx.fillStyle = '#000011';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Calculate map bounds and scaling
            const stars = Object.values(gameData.stars);
            const fleets = Object.values(gameData.fleets || {});
            const players = gameData.players;
            
            // Find bounds of the galaxy
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            stars.forEach(star => {
                minX = Math.min(minX, star.x);
                maxX = Math.max(maxX, star.x);
                minY = Math.min(minY, star.y);
                maxY = Math.max(maxY, star.y);
            });
            
            // Add padding and calculate scale
            const padding = 50;
            const scaleX = (canvas.width - 2 * padding) / (maxX - minX);
            const scaleY = (canvas.height - 2 * padding) / (maxY - minY);
            const scale = Math.min(scaleX, scaleY);
            
            // Center the map
            const offsetX = (canvas.width - (maxX - minX) * scale) / 2 - minX * scale;
            const offsetY = (canvas.height - (maxY - minY) * scale) / 2 - minY * scale;
            
            function mapToCanvas(x, y) {
                return {
                    x: x * scale + offsetX,
                    y: y * scale + offsetY
                };
            }
            
            // Draw hyperspace lanes first (connections between stars)
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            ctx.setLineDash([2, 4]);
            stars.forEach(star1 => {
                stars.forEach(star2 => {
                    if (star1.uid < star2.uid) {
                        const dist = Math.sqrt(Math.pow(star1.x - star2.x, 2) + Math.pow(star1.y - star2.y, 2));
                        // Only draw connections within reasonable hyperspace range
                        if (dist < 1.5) {
                            const pos1 = mapToCanvas(star1.x, star1.y);
                            const pos2 = mapToCanvas(star2.x, star2.y);
                            
                            ctx.beginPath();
                            ctx.moveTo(pos1.x, pos1.y);
                            ctx.lineTo(pos2.x, pos2.y);
                            ctx.stroke();
                        }
                    }
                });
            });
            ctx.setLineDash([]);
            
            // Draw stars using real Neptune's Pride logic
            stars.forEach(star => {
                const pos = mapToCanvas(star.x, star.y);
                const playerColor = star.puid >= 0 && players[star.puid] ? players[star.puid].color : '#666';
                const radius = 12 + (star.r || 5) * 0.5; // Base radius plus resources
                
                // Draw star background circle
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, radius, 0, 2 * Math.PI);
                if (star.puid >= 0) {
                    ctx.fillStyle = playerColor + '44'; // Semi-transparent player color
                } else {
                    ctx.fillStyle = '#2a2a2a'; // Neutral star
                }
                ctx.fill();
                
                // Draw star border
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, radius, 0, 2 * Math.PI);
                ctx.strokeStyle = star.puid >= 0 ? playerColor : '#666';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Draw carriers (ships) count
                if (star.st > 0) {
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 12px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(star.st.toString(), pos.x, pos.y + 4);
                }
                
                // Draw star name
                ctx.fillStyle = '#ccc';
                ctx.font = '11px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(star.n, pos.x, pos.y - radius - 5);
                
                // Draw resource indicators using real values
                if (star.e || star.i || star.s) {
                    const resources = [
                        { value: star.e || 0, color: '#4a4', offset: -8, label: 'E' },
                        { value: star.i || 0, color: '#a44', offset: 0, label: 'I' },
                        { value: star.s || 0, color: '#44a', offset: 8, label: 'S' }
                    ];
                    
                    resources.forEach((resource, i) => {
                        if (resource.value > 0) {
                            ctx.fillStyle = resource.color;
                            ctx.font = '8px Arial';
                            ctx.textAlign = 'center';
                            ctx.fillText(`${resource.label}:${resource.value}`, pos.x + resource.offset, pos.y + radius + 15);
                        }
                    });
                }
            });
            
            // Draw fleets
            fleets.forEach(fleet => {
                if (fleet.x !== undefined && fleet.y !== undefined) {
                    const pos = mapToCanvas(fleet.x, fleet.y);
                    const playerColor = fleet.puid >= 0 && players[fleet.puid] ? players[fleet.puid].color : '#888';
                    
                    // Draw fleet as a triangle
                    const size = 8;
                    ctx.fillStyle = playerColor;
                    ctx.beginPath();
                    ctx.moveTo(pos.x, pos.y - size);
                    ctx.lineTo(pos.x - size, pos.y + size);
                    ctx.lineTo(pos.x + size, pos.y + size);
                    ctx.closePath();
                    ctx.fill();
                    
                    // Draw fleet strength
                    if (fleet.st > 0) {
                        ctx.fillStyle = '#fff';
                        ctx.font = '10px Arial';
                        ctx.textAlign = 'center';
                        ctx.fillText(fleet.st.toString(), pos.x, pos.y + 2);
                    }
                }
            });
            
            console.log('Real Neptune\'s Pride map rendered with game data');
        }

        // Test functions for extension functionality
        function testScreenshot() {
            console.log('Testing screenshot functionality with real Neptune\'s Pride environment...');
            document.getElementById('extension-status').textContent = 'Testing screenshot...';
            
            // This would normally trigger the extension's screenshot function
            if (window.NeptunesPride && window.NeptunesPride.crux && window.NeptunesPride.crux.trigger) {
                window.NeptunesPride.crux.trigger('paste_report', 'screenshot');
                console.log('Screenshot trigger sent via real Crux');
            } else if (window.Crux && window.Crux.crux && window.Crux.crux.trigger) {
                window.Crux.crux.trigger('paste_report', 'screenshot');
                console.log('Screenshot trigger sent via Crux');
            } else {
                console.log('Extension screenshot function not available - no Crux trigger found');
            }
        }

        function testReports() {
            console.log('Testing report functionality with real Neptune\'s Pride environment...');
            document.getElementById('extension-status').textContent = 'Testing reports...';
            
            // This would normally trigger the extension's report generation
            if (window.NeptunesPride && window.NeptunesPride.crux && window.NeptunesPride.crux.trigger) {
                window.NeptunesPride.crux.trigger('show_screen', 'n_p_a');
                console.log('Report trigger sent via real Crux');
            } else if (window.Crux && window.Crux.crux && window.Crux.crux.trigger) {
                window.Crux.crux.trigger('show_screen', 'n_p_a');
                console.log('Report trigger sent via Crux');
            } else {
                console.log('Extension report function not available - no Crux trigger found');
            }
        }

        // Global functions for testing
        window.testScreenshot = testScreenshot;
        window.testReports = testReports;
    </script>
</body>
</html>
